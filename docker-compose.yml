version: '3.8'

services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: exampleuser
      POSTGRES_PASSWORD: examplepass
      POSTGRES_DB: exampledb
    ports:
      - "5432:5432"

  keycloak:
    image: jboss/keycloak:latest
    environment:
      DB_VENDOR: postgres
      DB_ADDR: postgres
      DB_DATABASE: exampledb
      DB_USER: exampleuser
      DB_PASSWORD: examplepass
    ports:
      - "8080:8080"
    depends_on:
      - postgres
